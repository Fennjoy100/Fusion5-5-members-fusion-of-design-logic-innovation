<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | ShopEasy</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav>
  <div class="logo">ShopEasy</div>

  <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="nav-container" id="navContainer">
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="contactus.html">Contact Us</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </div>

  <div class="nav-controls" id="navControls">
    <button id="micBtn" class="nav-btn" onclick="toggleVoice()">
      <span class="icon">🎤</span>
      <span class="btn-text">Voice Search</span>
    </button>
    <div class="translator">
      <select id="langSelect" onchange="changeLanguage(this.value)">
        <option value="en">🇺🇸 English</option>
        <option value="ta">🇮🇳 Tamil</option>
        <option value="ml">🇮🇳 Malayalam</option>
        <option value="hi">🇮🇳 Hindi</option>
        <option value="es">🇪🇸 Spanish</option>
      </select>
    </div>
    <button class="nav-btn" onclick="speakProducts()">
      <span class="icon">🔊</span>
      <span class="btn-text">Listen List</span>
    </button>
  </div>
</nav>

<section class="hero">
  <h1>Contact Us</h1>
  <p>We'd love to hear from you. Reach out for any queries.</p>
</section>

<div class="contact-container" style="max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 2rem; border-radius: 20px; border: 1px solid var(--glass-border);">
  <form id="contactForm" onsubmit="event.preventDefault(); alert('Message Sent Successfully!');">
    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; margin-bottom: 0.5rem;">Name</label>
      <input type="text" style="width: 100%; padding: 0.8rem; border-radius: 12px; border: 1px solid var(--glass-border); background: #1e293b; color: white;" required>
    </div>
    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; margin-bottom: 0.5rem;">Email</label>
      <input type="email" style="width: 100%; padding: 0.8rem; border-radius: 12px; border: 1px solid var(--glass-border); background: #1e293b; color: white;" required>
    </div>
    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; margin-bottom: 0.5rem;">Message</label>
      <textarea style="width: 100%; padding: 0.8rem; border-radius: 12px; border: 1px solid var(--glass-border); background: #1e293b; color: white; height: 100px;" required></textarea>
    </div>
    <button type="submit" class="buy-btn">Send Message</button>
  </form>
</div>

<script src="script.js"></script>

</body>
</html>
