<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Booking</title>

  <link rel="stylesheet" href="movies.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar"> <!-- Logo -->
     <div class="logo">
      <span class="logo-main">THIRAI</span><span class="logo-sub">VERSE</span>
    </div> 

    <ul class="menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="movies.html">Movies</a></li>
      <li><a href="movies.html#nowShowing">In Cinemas</a></li>
      <li><a href="movies.html#upcoming">Coming Soon</a></li>
    </ul> <!-- Right Side -->
    <div class="nav-right"> <input type="text" id="searchInput"  placeholder="Search movies...">
  </nav>

  <!-- SLIDER -->
  <div class="slider">

    <button class="arrow left" onclick="prevSlide()">❮</button>

    <div class="slide active">
      <img src="Images/Poster/bg-youth.png">
    </div>

    <div class="slide">
      <img src="Images/Poster/bg-eithlove.png">
    </div>

    <button class="arrow right" onclick="nextSlide()">❯</button>

    <div class="dots">
      <span class="dot active" onclick="goToSlide(0)"></span>
      <span class="dot" onclick="goToSlide(1)"></span>
    </div>

  </div>

  <!-- NOW SHOWING -->
  <section class="movies" id="nowShowing">
    <h2>Now Showing</h2>
    <div class="movie-grid now-grid" id="movieGrid"></div>
  </section>

  <!-- UPCOMING -->
  <section class="movies" id="upcoming">
    <h2>Upcoming Movies</h2>
    <div class="movie-grid upcoming-grid" id="upcomingmovieGrid"></div>
  </section>
  <div id="languageModal" class="modal">
    <div class="modal-box">

      <div class="modal-header">
        <h3 id="movieTitle">Movie Name</h3>
        <span class="close" onclick="closeModal()">×</span>
      </div>

      <p class="subtitle">Select movie language</p>

      <!-- 🔥 dynamic languages -->
      <div id="languageOptions" class="language-options"></div>

      <button class="proceed-btn" onclick="proceedBooking()">Proceed</button>

    </div>
  </div>
  <script src="moviesData.js"></script>
  <script src="movies.js"></script>


</body>

</html>
